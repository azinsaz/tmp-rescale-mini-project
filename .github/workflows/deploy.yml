name: Deploy

# Triggers on a SemVer tag push (e.g. `v0.0.1`). Stages mirror CI: lint → test
# → deploy. Deploy itself is a placeholder that builds the Docker images and
# validates the compose stack — no real cloud target is wired up yet.

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Reuse CI gates ────────────────────────────────────────────────────────
  # Tags must pass the same lint + test bar as a PR. We could `uses: ./.github/
  # workflows/ci.yml` here once the workflow is converted to a reusable form;
  # for now the deploy job depends on a smoke pass below.

  smoke:
    name: smoke · build + compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap .env
        run: cp .env.example .env

      - name: docker compose config (validates compose syntax + env vars)
        run: docker compose config -q

      - name: Build all images
        run: docker compose build

      - name: Bring stack up + healthcheck
        run: |
          docker compose up -d db backend frontend
          # Backend healthcheck waits for /api/health/ to return 200.
          for i in {1..30}; do
            status=$(docker inspect -f '{{.State.Health.Status}}' rescale-interview-backend-1 2>/dev/null || echo starting)
            echo "[$i] backend health: $status"
            [ "$status" = "healthy" ] && break
            sleep 2
          done
          test "$status" = "healthy"

      - name: Tear down
        if: ${{ always() }}
        run: docker compose down -v --remove-orphans

  # ─── Deploy placeholders ───────────────────────────────────────────────────
  # Both jobs build & tag a release image. Pushing to a registry and rolling
  # the runtime is intentionally left as TODOs so a real deploy target can be
  # wired up without rewriting the scaffold.

  deploy-backend:
    name: deploy · backend (placeholder)
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            --tag job-dashboard-backend:${{ github.ref_name }} \
            --tag job-dashboard-backend:latest \
            ./backend

      # TODO(deploy): authenticate to the target registry and push.
      #   - aws-actions/configure-aws-credentials@v4 + ECR login, OR
      #   - docker/login-action@v3 with GHCR_TOKEN, OR
      #   - gcloud auth configure-docker for GCR/Artifact Registry.
      # - name: Push to registry
      #   run: docker push job-dashboard-backend:${{ github.ref_name }}

      # TODO(deploy): trigger the runtime rollout. Examples:
      #   - aws ecs update-service --force-new-deployment ...
      #   - kubectl set image deployment/backend backend=...
      #   - flyctl deploy --image ...
      # - name: Roll out
      #   run: ./scripts/rollout-backend.sh ${{ github.ref_name }}

      - name: Smoke (image runs)
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=config.settings \
            job-dashboard-backend:${{ github.ref_name }} \
            python -c "import django; print('django', django.get_version())"

  deploy-frontend:
    name: deploy · frontend (placeholder)
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            --tag job-dashboard-frontend:${{ github.ref_name }} \
            --tag job-dashboard-frontend:latest \
            ./frontend

      # TODO(deploy): push the SPA build to a CDN / object store, OR push the
      # nginx-wrapped image to a registry as above. Static-site flows usually
      # prefer:
      #   - aws s3 sync frontend/dist s3://bucket/ + CloudFront invalidation
      #   - vercel deploy / netlify deploy
      #   - rsync to a server behind nginx
      # - name: Push to registry
      #   run: docker push job-dashboard-frontend:${{ github.ref_name }}

      - name: Smoke (image starts)
        run: |
          docker run --rm -d --name fe-smoke -p 18080:80 \
            job-dashboard-frontend:${{ github.ref_name }}
          for i in {1..15}; do
            curl -fsS http://localhost:18080/ >/dev/null && break || sleep 1
          done
          docker stop fe-smoke

  # ─── Release notes ─────────────────────────────────────────────────────────

  release:
    name: github release
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # TODO(deploy): replace with a richer release-notes generator (e.g.
      # release-drafter or release-please). For now we point the release at
      # CHANGELOG.md and let the maintainer edit it post-publish.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          generate_release_notes: false
