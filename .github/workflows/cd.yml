name: CD

# Triggers on a SemVer tag push (e.g. `v0.0.1`). Placeholder pipeline — proves
# the Dockerfiles still build at the tagged commit and attaches CHANGELOG to
# the GitHub Release. A real deploy target (registry push, rollout) is left as
# a TODO; the take-home scope is the scaffold.

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-images:
    name: build · backend + frontend images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t job-dashboard-backend:${{ github.ref_name }} ./backend

      - name: Build frontend image
        run: docker build -t job-dashboard-frontend:${{ github.ref_name }} ./frontend

      # TODO(deploy): push images and trigger a real rollout. Examples:
      #   - docker/login-action@v3 → docker push to GHCR/ECR/Artifact Registry
      #   - kubectl set image / aws ecs update-service / flyctl deploy

  release:
    name: github release
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
